---
# Install the exact sched_ext userspace release used by this benchmark rig.
#
# Ubuntu 26.04 does not currently provide the `scx` package, so the benchmark
# uses a source build pinned to an upstream tag.  The runtime schedulers are
# copied into /usr/local/lib/power_bench and exposed through /usr/local/bin;
# apply_optimizations.yml then resolves them normally with `command -v`.
#
# Usage:
#   ansible-playbook -i ansible/hosts ansible/install_scx.yml
#
# This playbook installs only the schedulers represented in run_suite.py.  It
# does not enable a scheduler or create a service; each measurement applies
# SCX at runtime and a reboot returns the target to the in-kernel scheduler.
- name: Install pinned sched_ext userspace schedulers for power_bench
  hosts: benchmarks
  become: true
  vars:
    scx_version: "1.1.1"
    scx_source_dir: "/opt/power_bench/scx-{{ scx_version }}"
    scx_install_dir: "/usr/local/lib/power_bench/scx-{{ scx_version }}"
    scx_schedulers:
      - scx_lavd
      - scx_bpfland
      - scx_rusty
      - scx_tickless
      - scx_flash
    scx_build_packages:
      - build-essential
      - cmake
      - cargo
      - rustc
      - clang
      - llvm
      - pkg-config
      - libelf-dev
      - protobuf-compiler
      - libseccomp-dev
      - libbpf-dev
      - pahole
  tasks:
    - name: Verify the kernel supports sched_ext
      stat:
        path: /sys/kernel/sched_ext
      register: scx_sysfs

    - name: Fail clearly if sched_ext is unavailable
      assert:
        that: scx_sysfs.stat.exists
        fail_msg: "kernel {{ ansible_kernel }} lacks /sys/kernel/sched_ext"

    - name: Install SCX build dependencies (Ubuntu source-install guidance)
      apt:
        name: "{{ scx_build_packages }}"
        state: present
        update_cache: true

    - name: Create the pinned SCX source parent directory
      file:
        path: /opt/power_bench
        state: directory
        mode: '0755'

    - name: Fetch sched-ext/scx at the audited upstream release
      git:
        repo: https://github.com/sched-ext/scx.git
        dest: "{{ scx_source_dir }}"
        version: "v{{ scx_version }}"
        depth: 1
        single_branch: true
        update: false

    - name: Build the schedulers included in the benchmark matrix
      command:
        argv:
          - cargo
          - build
          - --release
          - --package
          - scx_lavd
          - --package
          - scx_bpfland
          - --package
          - scx_rusty
          - --package
          - scx_tickless
          - --package
          - scx_flash
      args:
        chdir: "{{ scx_source_dir }}"
        # Flash was added after the original four-scheduler install.  Use its
        # artifact as the completion sentinel so an existing target builds it
        # once while fresh installs still build the complete matrix together.
        creates: "{{ scx_source_dir }}/target/release/scx_flash"

    - name: Create the versioned SCX install directory
      file:
        path: "{{ scx_install_dir }}"
        state: directory
        mode: '0755'

    - name: Install the audited scheduler executables
      copy:
        src: "{{ scx_source_dir }}/target/release/{{ item }}"
        dest: "{{ scx_install_dir }}/{{ item }}"
        remote_src: true
        owner: root
        group: root
        mode: '0755'
      loop: "{{ scx_schedulers }}"

    - name: Expose the audited scheduler executables on PATH
      file:
        src: "{{ scx_install_dir }}/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        state: link
        force: true
      loop: "{{ scx_schedulers }}"

    - name: Audit installed scheduler versions
      command: "/usr/local/bin/{{ item }} --version"
      loop: "{{ scx_schedulers }}"
      register: scx_versions
      changed_when: false

    - name: Report installed SCX scheduler versions
      debug:
        msg: "{{ scx_versions.results | map(attribute='stdout') | list }}"
