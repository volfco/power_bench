---
# Install the exact sched_ext userspace release used by this benchmark rig.
#
# The implementation lives in tasks/install_scx.yml so an SCX experiment can
# install the same audited binaries automatically when its requested scheduler
# is missing.
- name: Install pinned sched_ext userspace schedulers for power_bench
  hosts: benchmarks
  become: true
  tasks:
    - name: Install pinned sched_ext userspace schedulers
      include_tasks: tasks/install_scx.yml
