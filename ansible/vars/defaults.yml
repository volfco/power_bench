# Canonical fresh-boot defaults for power_bench.
#
# A per-iteration varfile (ansible/vars/iter_*.yml, generated by run_suite.py) must
# contain ONLY the knobs whose value differs from these. Anything omitted is left at the
# value below, which is what the host has after a fresh boot — so apply_optimizations.yml
# simply skips any knob not present in the varfile.
#
# This file is reference/documentation for the generator. It is NOT auto-loaded by
# apply_optimizations.yml (that play applies a knob only when its var is *defined*, i.e.
# present in the varfile). Two values are HOST-DEPENDENT — fill them from baseline.yml
# output before generating varfiles, so the generator can tell what is actually a change.

cpu_governor: powersave          # This rig's intel_pstate boot default; only performance/powersave are available
turbo_enabled: true              # turbo/boost on after boot
cstate_limit: -1                 # all idle states enabled
energy_perf_preference: default  # firmware-default EPP
pstate_max_perf_pct: 100
pstate_min_perf_pct: 0
pcie_aspm_policy: default
io_scheduler: none               # HOST-DEPENDENT: NVMe boots 'none', SATA often 'mq-deadline' — set from baseline.yml
usb_autosuspend: false           # control=on after boot
sata_link_pm: max_performance
hdd_apm_level: 254               # APM effectively off
gpu_power_profile: auto
services_to_disable: []          # nothing disabled
nic_power_save: false            # EEE off / WoL on after boot
scx_scheduler: none              # in-kernel EEVDF
scx_flags: ""
kernel_params: []                # stock cmdline
