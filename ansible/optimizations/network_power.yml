---
# NIC power: Energy Efficient Ethernet (EEE) on, Wake-on-LAN off, wifi power-save on.
# Apply:  ansible-playbook -i ansible/hosts ansible/optimizations/network_power.yml -e nic_power_save=true
# Revert: ansible-playbook -i ansible/hosts ansible/optimizations/network_power.yml -e nic_power_save=false
- name: "network_power - NIC power management (EEE, WoL, wifi PS)"
  hosts: benchmarks
  become: true
  vars:
    nic_power_save: true
    nic_interface: ""   # blank = autodetect the default-route interface
  tasks:
    - name: Install ethtool
      package:
        name: ethtool
        state: present
      failed_when: false

    - name: Detect default interface if not given
      shell: ip route show default | awk '{print $5; exit}'
      register: nic_detect
      changed_when: false
      when: nic_interface | length == 0

    - name: Resolve target interface
      set_fact:
        nic_if: "{{ nic_interface if (nic_interface | length > 0) else nic_detect.stdout | default('') }}"

    - name: Fail if no interface resolved
      fail:
        msg: "Could not determine a network interface; pass -e nic_interface=<iface>"
      when: nic_if | length == 0

    - name: Configure EEE and Wake-on-LAN
      shell: |
        ethtool --set-eee {{ nic_if }} eee {{ 'on' if nic_power_save else 'off' }} 2>/dev/null || true
        ethtool -s {{ nic_if }} wol {{ 'd' if nic_power_save else 'g' }} 2>/dev/null || true
      failed_when: false
      changed_when: true

    - name: Wifi power save (iw, if wireless)
      shell: iw dev {{ nic_if }} set power_save {{ 'on' if nic_power_save else 'off' }} 2>/dev/null || true
      failed_when: false
      changed_when: true

    - name: Verify
      shell: |
        ethtool --show-eee {{ nic_if }} 2>/dev/null || true
        ethtool {{ nic_if }} 2>/dev/null | grep -i wake-on || true
      register: nic_now
      changed_when: false
      failed_when: false

    - name: Report
      debug:
        msg: "NIC {{ nic_if }} power_save={{ nic_power_save }} | {{ nic_now.stdout_lines }}"
