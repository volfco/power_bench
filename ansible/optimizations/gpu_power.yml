---
# GPU power management across amdgpu / i915 / nvidia. Best-effort and driver-specific;
# mainly meaningful when a GPU workload is present (otherwise idle GPU power gating dominates).
# Apply:  ansible-playbook -i ansible/hosts ansible/optimizations/gpu_power.yml -e gpu_power_profile=low
# Revert: ansible-playbook -i ansible/hosts ansible/optimizations/gpu_power.yml -e gpu_power_profile=auto
- name: "gpu_power - GPU power management"
  hosts: benchmarks
  become: true
  vars:
    gpu_power_profile: low   # low | auto  (low = bias to power saving)
  tasks:
    - name: AMD amdgpu - dpm state + force performance level
      shell: |
        for c in /sys/class/drm/card*/device; do
          [ -w "$c/power_dpm_state" ] && \
            echo {{ 'battery' if gpu_power_profile == 'low' else 'balanced' }} > "$c/power_dpm_state" || true
          [ -w "$c/power_dpm_force_performance_level" ] && \
            echo {{ 'low' if gpu_power_profile == 'low' else 'auto' }} > "$c/power_dpm_force_performance_level" || true
        done
      failed_when: false
      changed_when: true

    - name: Intel i915 - report RC6 state (default-on; not forced here)
      shell: cat /sys/class/drm/card*/power/rc6_enable 2>/dev/null || echo "n/a"
      register: i915_rc6
      changed_when: false
      failed_when: false

    - name: NVIDIA - persistence mode + minimum power limit (if nvidia-smi present)
      shell: |
        if command -v nvidia-smi >/dev/null 2>&1; then
          nvidia-smi -pm 1 >/dev/null 2>&1 || true
          if [ "{{ gpu_power_profile }}" = "low" ]; then
            min=$(nvidia-smi -q -d POWER | sed -n 's/.*Min Power Limit *: *\([0-9.]*\).*/\1/p' | head -1)
            [ -n "$min" ] && nvidia-smi -pl "$min" >/dev/null 2>&1 || true
          fi
        fi
      failed_when: false
      changed_when: true

    - name: Report
      debug:
        msg: "GPU profile requested: {{ gpu_power_profile }} (i915 rc6={{ i915_rc6.stdout }}). amdgpu/i915/nvidia handled best-effort."
