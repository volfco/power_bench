---
# Block I/O scheduler. 'none' (no-op) suits fast NVMe/SSD; mq-deadline/bfq/kyber for the rest.
# Apply:  ansible-playbook -i ansible/hosts ansible/optimizations/io_scheduler.yml -e io_scheduler=none
# Revert: reset_to_baseline.yml (restores this rig's captured baseline, none)
- name: "io_scheduler - set the block I/O scheduler"
  hosts: benchmarks
  become: true
  vars:
    io_scheduler: none   # none | mq-deadline | kyber | bfq
  tasks:
    - name: Set scheduler on all physical block devices that support it
      shell: |
        for q in /sys/block/*/queue/scheduler; do
          dev=$(echo "$q" | cut -d/ -f4)
          case "$dev" in loop*|ram*|zram*|dm-*|sr*) continue;; esac
          if grep -qw "{{ io_scheduler }}" "$q"; then
            echo "{{ io_scheduler }}" > "$q" || true
          fi
        done
      changed_when: true

    - name: Verify
      shell: |
        for q in /sys/block/*/queue/scheduler; do
          dev=$(echo "$q" | cut -d/ -f4)
          case "$dev" in loop*|ram*|zram*|dm-*|sr*) continue;; esac
          echo "$dev: $(cat $q)"
        done
      register: io_now
      changed_when: false

    - name: Report
      debug:
        var: io_now.stdout_lines
