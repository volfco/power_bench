    function render(){const status=R.valid?'Valid':'Needs attention',summary=[['Status',status],['Host',R.host],['Test',R.test],['Configuration',R.optimization],['Energy',finite(R.energy_wh)?num(R.energy_wh,3)+' Wh':'—'],['Load power',finite(R.bench_power_w)?num(R.bench_power_w)+' W':'—'],['Peak power',finite(R.peak_power_w)?num(R.peak_power_w)+' W':'—'],['Result',finite(R.bench_score)?num(R.bench_score,3)+' '+(R.bench_unit||''):'—'],['Samples',Number(R.idle_samples||0)+Number(R.bench_samples||0)],['Started',R.started_at||'—']];$('#title').textContent='Run #'+(R.run_id??'—');$('#subtitle').textContent=[R.host,R.test,R.optimization].filter(Boolean).join(' · ');$('#summary').innerHTML=summary.slice(0,5).map(([k,v])=>'<article class="stat"><strong>'+esc(v)+'</strong><span>'+esc(k)+'</span></article>').join('');rows('#details',[['Run ID',R.run_id],['Status',R.quality_reason],['Host / IP',R.host],['Test',R.test],['Optimization',R.optimization],['Repeat',R.repeat_idx],['Started',R.started_at],['Result',finite(R.bench_score)?num(R.bench_score,3)+' '+(R.bench_unit||''):null],['Energy',finite(R.energy_wh)?num(R.energy_wh,3)+' Wh':null],['Idle / bench samples',(R.idle_samples||0)+' / '+(R.bench_samples||0)],['Idle / load / peak power',[R.idle_power_w,R.bench_power_w,R.peak_power_w].map(v=>finite(v)?num(v)+' W':'—').join(' / ')],['Sample coverage',finite(R.bench_sample_coverage)?num(Number(R.bench_sample_coverage)*100,1)+'%':null],['Kernel',R.kernel],['CPU',R.cpu_model],['Memory',bytes(R.memory_bytes)]],'No run details were recorded.');rows('#config',Object.entries(DATA.config||{}).map(([k,v])=>[k,typeof v==='object'?JSON.stringify(v):v]),'No applied-configuration snapshot was recorded.');renderChart()}
    function renderChart(){const pts=DATA.readings.filter(p=>finite(p.elapsed_s)&&finite(p.power_w));if(!pts.length){$('#chart').innerHTML='<div class="empty">No timestamped power readings were recorded for this run.</div>';return}const W=940,H=340,P={l:58,r:18,t:15,b:43},xs=pts.map(p=>Number(p.elapsed_s)),ys=pts.map(p=>Number(p.power_w)),minX=Math.min(...xs),maxX=Math.max(...xs),rawMin=Math.min(...ys),rawMax=Math.max(...ys),pad=Math.max(0.5,(rawMax-rawMin)*.12),minY=Math.max(0,rawMin-pad),maxY=rawMax+pad,x=v=>P.l+(v-minX)/(maxX-minX||1)*(W-P.l-P.r),y=v=>P.t+(maxY-v)/(maxY-minY||1)*(H-P.t-P.b),colors={settle:'#a2751e',idle:'#087e78',bench:'#173f53',cooldown:'#c94f5b'},line=pts.map(p=>x(Number(p.elapsed_s))+','+y(Number(p.power_w))).join(' '),dots=pts.map(p=>{const phase=p.phase||'unlabeled',c=colors[phase]||'#61716f';return'<circle cx="'+x(Number(p.elapsed_s))+'" cy="'+y(Number(p.power_w))+'" r="3.4" fill="'+c+'"><title>'+esc(phase)+' · '+num(p.elapsed_s,1)+' s · '+num(p.power_w,2)+' W</title></circle>'}).join('');$('#chart').innerHTML='<svg viewBox="0 0 '+W+' '+H+'" style="height:340px"><style>text{font:11px system-ui;fill:var(--muted)}</style><line x1="'+P.l+'" x2="'+P.l+'" y1="'+P.t+'" y2="'+(H-P.b)+'" stroke="var(--line)"/><line x1="'+P.l+'" x2="'+(W-P.r)+'" y1="'+(H-P.b)+'" y2="'+(H-P.b)+'" stroke="var(--line)"/><polyline points="'+line+'" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+dots+'<text x="'+P.l+'" y="'+(P.t+2)+'">'+num(maxY,1)+' W</text><text x="'+P.l+'" y="'+(H-P.b-4)+'">'+num(minY,1)+' W</text><text x="'+P.l+'" y="'+(H-12)+'">'+num(minX,1)+' s</text><text x="'+(W-P.r)+'" y="'+(H-12)+'" text-anchor="end">'+num(maxX,1)+' s</text><text x="'+W/2+'" y="'+(H-12)+'" text-anchor="middle">elapsed time</text></svg>';const phases=Array.from(new Set(pts.map(p=>p.phase||'unlabeled')));$('#legend').innerHTML=phases.map(p=>'<span><i class="dot" style="background:'+(colors[p]||'#61716f')+'"></i>'+esc(p)+'</span>').join('');$('#chartCaption').textContent=pts.length+' readings across '+num(maxX-minX,1)+' seconds.'}
    render();
  </script>
