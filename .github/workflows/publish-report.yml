name: Publish benchmark report

on:
  push:
    branches: [master]
    paths:
      - FINAL_REPORT.md
      - site/**
      - .github/workflows/publish-report.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Generate report site
        run: |
          mkdir -p site
          {
            printf '%s\n' '---' 'layout: default' 'title: BLE Wall-Power Optimization Report' '---' ''
            cat FINAL_REPORT.md
          } > site/index.md

      - name: Build site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
